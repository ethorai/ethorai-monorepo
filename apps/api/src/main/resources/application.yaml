spring:
  datasource:
    url: jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5433}/${PGDATABASE:ai_therapists}
    username: ${PGUSER:postgres}
    password: ${PGPASSWORD:postgres}
  flyway:
    enabled: true
    locations: classpath:db/migration
  jooq:
    sql-dialect: postgres

server:
  port: ${PORT:${SERVER_PORT:8080}}

openai:
  api-key: ${OPENAI_API_KEY:}
  model: gpt-4o
  temperature: 0.4

jwt:
  secret: ${JWT_SECRET:}

internal:
  secret: ${INTERNAL_SECRET:}
