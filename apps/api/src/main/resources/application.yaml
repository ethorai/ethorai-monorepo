spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/ai_therapists
    username: postgres
    password: postgres
  flyway:
    enabled: true
    locations: classpath:db/migration
  jooq:
    sql-dialect: postgres
  server:
    port: ${SERVER_PORT:8080}

openai:
  api-key: ${OPENAI_API_KEY:}
  model: gpt-4o
  temperature: 0.4

jwt:
  secret: ${JWT_SECRET:}
